<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sachin Kumar — Resume</title>
<style>
  :root{
    --deep: #071A24;    
    --dark: #0F3A46;    
    --primary: #1D9A9A; 
    --amber: #37C7B7;   
    --glow: #8FE7FF;    
    --muted: rgba(221,245,248,0.90);
    --white: #fff;
    --card-border: rgba(255,255,255,0.1);
    --maxw: 1000px;
    font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }
  html,body{
    height:100%; margin:0; 
    background: radial-gradient(circle at top center, #123F50 0%, var(--deep) 70%, #020A0F 100%);
    color:var(--white); 
    -webkit-font-smoothing:antialiased; 
    overflow-x: hidden;
  }
  *{box-sizing:border-box}
  #rippleCanvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none; mix-blend-mode: screen; 
  }
  .page{
    position:relative; min-height:100vh; display:flex;
    align-items:flex-start; justify-content:center; padding:44px 18px 80px;
    z-index: 1;
  }
  
  .resume-card{
    width:100%; max-width:var(--maxw); border-radius:16px; 
    border:1px solid var(--card-border);
    background: rgba(7, 26, 36, 0.62); 
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    box-shadow:0 30px 80px rgba(0,0,0,0.6); 
    overflow:hidden; display:grid; grid-template-columns:320px 1fr; gap:26px; padding:26px;
    position:relative;
  }
  .resume-card > *{position:relative; z-index:2}
  @media (max-width:900px){ .resume-card { grid-template-columns:1fr; padding:18px } }
  .sidebar{padding:6px 4px}
  .identity{display:flex;gap:14px;align-items:center}
  .avatar{width:92px;height:92px;border-radius:14px;background:linear-gradient(135deg,var(--glow),var(--primary));display:flex;align-items:center;justify-content:center;font-weight:800;color:#021014;font-size:28px;box-shadow:0 12px 36px rgba(55,199,183,0.18);}
  .name-block h1{margin:0;font-size:20px;color:var(--white)}
  .name-block .tag{color:var(--muted);font-size:13px;margin-top:6px}
  
  .contact{margin-top:18px;font-size:14px;color:var(--muted);line-height:1.6}
  .contact a{color:var(--white);text-decoration:none; border-bottom: 1px solid transparent; transition: 0.2s;}
  .contact a:hover{border-color: var(--glow);}
  
  .section{margin-top:22px}
  .section h3{margin:0 0 10px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px}
  
  .skills{display:flex;flex-wrap:wrap;gap:8px}
  
  .skill, .term-link {
    background: rgba(255,255,255,0.07); padding:6px 10px; border-radius:999px; 
    font-size:13px; border:1px solid rgba(255,255,255,0.05); 
    transition: all 0.2s ease; cursor: pointer; position: relative;
  }
  .skill:hover, .term-link:hover {
    background: rgba(255,255,255,0.15); border-color: var(--glow);
    color: var(--glow); transform: translateY(-1px);
  }
  .term-link {
    display: inline-block; padding: 2px 6px; border-radius: 4px; margin: 0 2px;
    border-bottom: 1px dashed rgba(255,255,255,0.3);
  }
  .main{padding:4px 4px}
  .hero-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:8px}
  .summary{font-size:15px;color:var(--muted);line-height:1.6;max-width:720px}
  
  .print-btn{background:linear-gradient(180deg,var(--primary),var(--amber));color:#021014;font-weight:800;padding:10px 12px;border-radius:12px;border:none;cursor:pointer;box-shadow:0 12px 28px rgba(143,231,255,0.16); white-space:nowrap;}
  .print-btn:hover{ transform: translateY(-2px); box-shadow: 0 15px 30px rgba(143,231,255,0.28); }
  .section-card{margin-top:18px;padding:14px;border-radius:12px;background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05)}
  .section-card h3{margin:0 0 12px; color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:1px}
  ul.bullets{margin:10px 0 0;padding-left:18px}
  ul.bullets li{margin:6px 0;color:var(--white);line-height:1.5}
  .job h4{margin:0 0 2px; font-size:15px; color:var(--white)}
  .job + .job{margin-top:14px}
  .meta{font-size:13px; color:var(--muted)}
  /* --- PROJECT CARDS --- */
  .project-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px}
  @media(max-width:600px){.project-grid{grid-template-columns:1fr}}
  .project-tile{
